<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autumn Bakery | Whimsical Treats</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lora', serif; background-color: #fffaf0; color: #333; margin: 0; }
        .navbar { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #8b5e3c; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #333; }
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&q=80&w=1600'); background-size: cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px; max-width: 1200px; margin: 0 auto; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card h3 { text-align: center; color: #8b5e3c; }
        .btn { background: #8b5e3c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        footer { text-align: center; padding: 40px; color: #777; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Autumn Bakery</div>
        <ul class="nav-links">
            <li><a href="#">Order Online</a></li>
            <li><a href="#">Our Story</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>The healing power of cake should never be underestimated.</h1>
            <a href="#menu" class="btn">Order Now</a>
        </div>
    </header>

    <main id="menu">
        <section class="grid-layout">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?auto=format&fit=crop&q=80&w=600" alt="Cookies">
                <h3>Signature Cookies</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1519915028121-7d3463d20b13?auto=format&fit=crop&q=80&w=600" alt="Tarts">
                <h3>Artisan Tarts</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&q=80&w=600" alt="Bread">
                <h3>Fresh Sourdough</h3>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Autumn Bakery</p>
    </footer>
</body>
</html>
